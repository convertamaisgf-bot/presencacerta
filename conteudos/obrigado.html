<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #D4AF37;
  --gold-glow: rgba(212,175,55,0.18);
  --bg: #0A0A0A;
  --text: #F0EDE4;
  --text-2: #B0A898;
  --success: #25D366;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -300px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 700px;
  background: radial-gradient(circle, var(--gold-glow) 0%, transparent 60%);
  pointer-events: none;
}

.wrap {
  text-align: center;
  padding: 40px 24px;
  max-width: 400px;
}

.logo {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 400;
  margin-bottom: 40px;
  color: var(--text-2);
}
.logo em { color: var(--gold); font-style: italic; font-weight: 600; }

.icon {
  width: 64px; height: 64px;
  margin: 0 auto 24px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--gold);
  box-shadow: 0 0 32px var(--gold-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 32px var(--gold-glow); }
  50%      { box-shadow: 0 0 56px var(--gold-glow); }
}

h1 {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 38px);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 10px;
}
h1 em { font-style: italic; color: var(--gold); }

p {
  font-size: 15px;
  color: var(--text-2);
  font-weight: 300;
  margin-bottom: 32px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--success);
  color: #fff;
  font-weight: 600;
  font-size: 16px;
  padding: 14px 28px;
  border-radius: 6px;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(37,211,102,0.28);
  transition: background 0.2s, transform 0.2s;
}
.btn:hover { background: #1ebc59; transform: translateY(-1px); }
.btn svg { width: 20px; height: 20px; flex-shrink: 0; }
